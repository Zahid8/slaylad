<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>SLAY'LAD social preview source</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.cdnfonts.com/css/kg-inimitable-original" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: grid;
        background: #ffffff;
        color: #075d2b;
        font-family: "DM Sans", sans-serif;
        place-items: center;
      }

      .banner {
        display: flex;
        width: 1080px;
        height: 480px;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 32px 58px 28px;
        border-radius: 32px;
        background: #f3f7ed;
      }

      h1 {
        margin: 0;
        color: #008000;
        font-family: "KG Inimitable Original", sans-serif;
        font-size: 188px;
        font-weight: 400;
        letter-spacing: 0.025em;
        line-height: 0.96;
      }

      .tagline-row {
        display: grid;
        width: 100%;
        grid-template-columns: 130px auto 130px;
        gap: 28px;
        align-items: center;
        justify-content: center;
        margin-top: 9px;
      }

      .rule {
        width: 130px;
        height: 5px;
        background: #4f9a43;
      }

      .tagline {
        margin: 0;
        color: #075d2b;
        font-family: "Manrope", sans-serif;
        font-size: 31px;
        font-weight: 800;
        letter-spacing: 0.035em;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .descriptor-row {
        display: flex;
        gap: 22px;
        align-items: center;
        justify-content: center;
        margin-top: 15px;
      }

      .descriptor {
        margin: 0;
        color: #087323;
        font-family: "Manrope", sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.31em;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .sprig {
        width: 86px;
        height: 34px;
        color: #4f9a43;
      }

      .sprig.right {
        transform: scaleX(-1);
      }

      .orders {
        width: 100%;
        margin-top: 16px;
      }

      .order-label {
        margin: 0 0 10px 8px;
        color: #66746d;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.16em;
        line-height: 1;
        text-transform: uppercase;
      }

      .order-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .order {
        display: flex;
        height: 84px;
        align-items: center;
        justify-content: space-between;
        padding: 0 27px;
        border-radius: 18px;
        color: #ffffff;
        font-family: "Manrope", sans-serif;
      }

      .order strong,
      .order span {
        display: block;
      }

      .order strong {
        font-size: 20px;
        font-weight: 800;
        line-height: 1.15;
      }

      .order span {
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 13px;
        font-weight: 600;
      }

      .order-arrow {
        font-family: "Manrope", sans-serif;
        font-size: 29px;
        font-weight: 600;
      }

      .zomato {
        background: #e23744;
      }

      .whatsapp {
        background: #008000;
      }
    </style>
  </head>
  <body>
    <main class="banner">
      <h1>SLAY'LAD</h1>
      <div class="tagline-row">
        <span class="rule"></span>
        <p class="tagline">Eat clean. Slay hard.</p>
        <span class="rule"></span>
      </div>
      <div class="descriptor-row">
        <svg class="sprig" aria-hidden="true" viewBox="0 0 86 34">
          <path d="M5 29C28 29 45 21 77 5" fill="none" stroke="currentColor" stroke-width="2.5" />
          <path d="M20 26C8 24 5 18 5 11c10 0 17 5 15 15ZM35 22c-9-5-10-12-7-18 9 3 13 10 7 18ZM49 16c-5-8-2-14 3-18 7 6 7 12-3 18ZM59 13c1-10 7-14 14-14 0 9-5 15-14 14Z" fill="currentColor" />
        </svg>
        <p class="descriptor">Healthy meal kitchen</p>
        <svg class="sprig right" aria-hidden="true" viewBox="0 0 86 34">
          <path d="M5 29C28 29 45 21 77 5" fill="none" stroke="currentColor" stroke-width="2.5" />
          <path d="M20 26C8 24 5 18 5 11c10 0 17 5 15 15ZM35 22c-9-5-10-12-7-18 9 3 13 10 7 18ZM49 16c-5-8-2-14 3-18 7 6 7 12-3 18ZM59 13c1-10 7-14 14-14 0 9-5 15-14 14Z" fill="currentColor" />
        </svg>
      </div>
      <div class="orders">
        <p class="order-label">Choose how you'd like to order</p>
        <div class="order-row">
          <div class="order zomato">
            <div>
              <strong>Order a single meal</strong>
              <span>Delivery available on Zomato</span>
            </div>
            <div class="order-arrow">↗</div>
          </div>
          <div class="order whatsapp">
            <div>
              <strong>Planning a bulk order?</strong>
              <span>Connect with us on WhatsApp</span>
            </div>
            <div class="order-arrow">↗</div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
